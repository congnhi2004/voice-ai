name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      region:
        description: "Cloud Run region"
        required: true
        default: "us-central1"
      service:
        description: "Cloud Run service name"
        required: true
        default: "voice-ai"
      image_tag:
        description: "Image tag to build and deploy"
        required: true
        default: "manual"

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: voice-ai

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint, test, build
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm test
          npm run build

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Build container locally
        run: docker build -t "voice-ai:${{ github.sha }}" .

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: ${{ inputs.environment }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${{ inputs.region }}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: image
        shell: bash
        env:
          IMAGE_TAG_URI: ${{ inputs.region }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'voice-ai' }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag == 'manual' && github.sha || inputs.image_tag }}
        run: |
          set -euo pipefail
          docker build -t "${IMAGE_TAG_URI}" .
          docker push "${IMAGE_TAG_URI}"
          IMAGE_DIGEST="$(gcloud artifacts docker images describe "${IMAGE_TAG_URI}" --format='value(image_summary.digest)')"
          if [[ -z "${IMAGE_DIGEST}" ]]; then
            echo "Artifact Registry did not return an image digest for ${IMAGE_TAG_URI}" >&2
            exit 1
          fi
          IMAGE_DIGEST_URI="${IMAGE_TAG_URI%:*}@${IMAGE_DIGEST}"
          echo "IMAGE_TAG_URI=${IMAGE_TAG_URI}" >> "${GITHUB_ENV}"
          echo "IMAGE_URI=${IMAGE_DIGEST_URI}" >> "${GITHUB_ENV}"
          echo "image_tag_uri=${IMAGE_TAG_URI}" >> "${GITHUB_OUTPUT}"
          echo "image_digest_uri=${IMAGE_DIGEST_URI}" >> "${GITHUB_OUTPUT}"
          echo "Published ${IMAGE_DIGEST_URI}"

      - name: Deploy Cloud Run service
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ inputs.region }}
          service: ${{ inputs.service }}
          image: ${{ env.IMAGE_URI }}
          env_vars: |-
            ENVIRONMENT=${{ inputs.environment }}
            SERVICE_VERSION=${{ github.sha }}
            TTS_PROVIDER=openai
            OPENAI_TTS_MODEL=${{ vars.OPENAI_TTS_MODEL || 'gpt-4o-mini-tts' }}
            OPENAI_TTS_VOICE=${{ vars.OPENAI_TTS_VOICE || 'marin' }}
            OPENAI_TTS_RESPONSE_FORMAT=${{ vars.OPENAI_TTS_RESPONSE_FORMAT || 'wav' }}
            GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_REGION=${{ inputs.region }}
            STORAGE_PROVIDER=gcs
            AUDIO_STORAGE_MODE=gcs
            GCS_AUDIO_BUCKET=${{ vars.GCS_AUDIO_BUCKET }}
            GCS_AUDIO_PREFIX=voice-ai/audio
            SIGNED_URL_TTL_SECONDS=3600
            VIDEO_LOCALIZATION_ENABLED=true
            VIDEO_STORAGE_MODE=gcs
            GCS_ARTIFACT_BUCKET=${{ vars.GCS_ARTIFACT_BUCKET }}
            GCS_SOURCE_VIDEO_PREFIX=voice-ai/video/source
            GCS_RENDERED_VIDEO_PREFIX=voice-ai/video/rendered
            GCS_INTERMEDIATE_PREFIX=voice-ai/video/intermediate
            JOB_DISPATCH_MODE=cloud_tasks
            CLOUD_TASKS_QUEUE=${{ vars.CLOUD_TASKS_QUEUE || 'voice-ai-video' }}
            CLOUD_TASKS_LOCATION=${{ inputs.region }}
            CLOUD_TASKS_HANDLER_PATH=/internal/tasks/video-localization
            CLOUD_TASKS_SERVICE_ACCOUNT=${{ vars.CLOUD_TASKS_SERVICE_ACCOUNT }}
            MLFLOW_TRACKING_URI=${{ vars.MLFLOW_TRACKING_URI }}
            MLFLOW_EXPERIMENT_NAME=voice-ai-tts-synthesis
            MLFLOW_VIDEO_EXPERIMENT_NAME=voice-ai-video-localization
            VIDEO_OBSERVABILITY_STAGES=upload,stt,translation,tts,alignment,render,delivery
            LOG_LEVEL=INFO
            STRUCTURED_LOGS=true
            MAX_INPUT_CHARS=5000
            MAX_UPLOAD_BYTES=524288000
            REQUEST_TIMEOUT_SECONDS=3600
            VIDEO_STAGE_TIMEOUT_SECONDS=3300
            FFMPEG_THREADS=2
          secrets: |-
            API_KEYS=${{ secrets.API_KEYS_SECRET_NAME }}:latest
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY_SECRET_NAME }}:latest
          flags: >-
            --service-account=${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
            --memory=4Gi
            --cpu=2
            --min-instances=0
            --max-instances=10
            --concurrency=1
            --timeout=3600

      - name: Post-deploy smoke and observability
        shell: bash
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ inputs.region }}
          SERVICE_NAME: ${{ inputs.service }}
          CLOUD_TASKS_QUEUE: ${{ vars.CLOUD_TASKS_QUEUE || 'voice-ai-video' }}
          GCS_AUDIO_BUCKET: ${{ vars.GCS_AUDIO_BUCKET }}
          GCS_ARTIFACT_BUCKET: ${{ vars.GCS_ARTIFACT_BUCKET }}
          RELEASE_SMOKE_API_KEY: ${{ secrets.RELEASE_SMOKE_API_KEY || '' }}
        run: |
          set -euo pipefail
          ./scripts/cloud-run-observe.sh

      - name: Print service URL
        run: |
          echo "${{ steps.deploy.outputs.url }}"
          echo "Image digest: ${{ steps.image.outputs.image_digest_uri }}"
